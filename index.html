<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial;
            margin: 0;
            text-align: center;
        }

        /* Navigation bar */
        nav {
            background-color: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* Search bar */
        .search-box {
            margin: 15px;
        }

        input[type="text"] {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px;
        }

        /* Sections */
        section {
            padding: 40px;
        }

        #home { background-color: lightblue; }
        #about { background-color: lightgreen; }
        #contacts { background-color: lightyellow; }
        #emergency { background-color: lightcoral; }
    </style>
</head>

<body>

<!-- Navigation -->
<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contacts">Contacts</a>
    <a href="#emergency">Emergency</a>
</nav>

<!-- Search Bar -->
<div class="search-box">
    <input type="text" placeholder="Search here...">
    <button>Search</button>
</div>

<!-- Sections -->

<section id="home">
    <h1>Home</h1>
    <p>Welcome to the homepage.</p>
</section>

<section id="about">
    <h1>About</h1>
    <p>This page explains the website.</p>
</section>

<section id="contacts">
    <h1>Contacts</h1>
    <p>Email: example@email.com</p>
    <p>Phone: +254XXXXXXXXX</p>
</section>

<section id="emergency">
    <h1>Emergency</h1>
    <p>Call: 999 or 112</p>
</section>

</body>
</html>
