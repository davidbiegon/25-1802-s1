<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>

    <style>
        body {
            font-family: 38-lineart;
            margin: 0;
            text-align: center;
        }

        nav {
            background-color: black;
            padding: 15px;
        }

        nav a {
            color: cream;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .search-box {
            margin: 15px;
        }

        input[type="text"] {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px;
        }

        section {
            padding: 40px;
        }

        #home { background-color: lightblue; }
        #about { background-color: lightgreen; }
        #contacts { background-color: lightyellow; }
        #emergency { background-color: lightcoral; }

        img {
            width: 500px;
            margin: 40px;
        }

        video {
            width: 300px;
            margin: 10px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
        }

        table, th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- Navigation -->
<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contacts">Contacts</a>
    <a href="#emergency">Emergency</a>
</nav>

<!-- Search Bar -->
<div class="search-box">
    <input type="text" placeholder="Search here...">
    <button>Search</button>
</div>

<!-- MAIN CONTENT -->
<section>

    <!-- Heading -->
    <h1>Welcome to My Website</h1>

    <!-- Paragraph -->
    <p>This is a simple website showing images, videos, and tables.</p>

    <!-- Images -->
    <h2>Images</h2>
    <img src="images/img1.jpg" alt="Image 1">
    <img src="images/img2.jpg" alt="Image 2">
    <img src="images/img3.jpg" alt="Image 3">

    <!-- Videos -->
    <h2>Videos</h2>
    <video controls>
        <source src="https://youtu.be/XcEmqKLCQZE?si=g7KV8Zcfwv0e1Sng" type="video/mp4">
    </video>

    <video controls>
        <source src="https://youtu.be/qVbeGM6vdQo?si=zz_fWg3im266Omn5" type="video/mp4">
    </video>

    <!-- Tables -->
    <h2>Table 1</h2>
    <table>
        <tr>
            <th>Size</th>
            <th>Chest sizr</th>
        </tr>
        <tr>
            <td>XS</td>
            <td>34-36</td>
        </tr>
        <tr>
            <td>S</td>
            <td>36-38</td>
        </tr>
    </table>

    <h2>Table 2</h2>
    <table>
        <tr>
            <th>SIZE</th>
            <th>CHEST SIZE</th>
        </tr>
        <tr>
            <td>M</td>
            <td>38-40</td>
        </tr>
        <tr>
            <td>L</td>
            <td>40-42</td>
        </tr>
    </table>

</section>

</body>
</html>
